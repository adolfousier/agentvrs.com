<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2236;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Isometric cube background -->
  <polygon points="16,2 28,9 28,23 16,30 4,23 4,9" fill="url(#grad2)" stroke="#00d4ff" stroke-width="1.5"/>
  <!-- Inner faces -->
  <polygon points="16,2 28,9 16,16 4,9" fill="#00d4ff" opacity="0.3"/>
  <polygon points="4,9 16,16 16,30 4,23" fill="#00d4ff" opacity="0.15"/>
  <polygon points="28,9 16,16 16,30 28,23" fill="#00d4ff" opacity="0.2"/>
  <!-- AV text -->
  <text x="16" y="20" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="url(#grad1)" text-anchor="middle">AV</text>
</svg>
